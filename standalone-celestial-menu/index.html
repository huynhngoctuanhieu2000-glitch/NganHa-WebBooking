<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Ngân Hà Spa - Celestial 3D Category Demo</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap");

      @font-face {
        font-family: "Abramo";
        src: local("Abramo");
        font-display: swap;
      }

      :root {
        --bg: #01040a;
        --deep: #07111e;
        --panel: rgba(3, 8, 17, 0.7);
        --panel-strong: rgba(7, 12, 21, 0.9);
        --gold: #b8893f;
        --gold-2: #d1ad68;
        --gold-3: #f1dfb0;
        --text: #f1dfb0;
        --muted: #bca87e;
        --word-font: "EB Garamond", "Abramo", Georgia, "Times New Roman", serif;
        --ui-font: Inter, system-ui, sans-serif;
        --safe-top: max(env(safe-area-inset-top), 18px);
        --safe-bottom: max(env(safe-area-inset-bottom), 18px);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(ellipse at 50% 38%, rgba(54, 75, 112, 0.24), transparent 46%),
          radial-gradient(ellipse at 28% 68%, rgba(106, 70, 107, 0.1), transparent 42%),
          radial-gradient(ellipse at 50% 108%, rgba(184, 137, 63, 0.18), transparent 38%),
          linear-gradient(180deg, #01040a 0%, #07111e 54%, #010309 100%);
        color: var(--text);
        font-family: var(--word-font);
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        border: 0;
        background: transparent;
        font-family: var(--word-font);
      }

      #app,
      #scene,
      #galaxy-canvas,
      .galaxy-nebula {
        position: fixed;
        inset: 0;
      }

      .galaxy-nebula {
        z-index: 0;
        pointer-events: none;
        background:
          radial-gradient(ellipse 60% 40% at 20% 25%, rgba(212, 175, 55, 0.1), transparent 60%),
          radial-gradient(ellipse 50% 45% at 80% 70%, rgba(90, 60, 140, 0.14), transparent 60%),
          radial-gradient(ellipse 70% 50% at 50% 100%, rgba(20, 25, 50, 0.5), transparent 70%),
          linear-gradient(180deg, #05060f 0%, #0b0e1e 60%, #05060f 100%);
      }

      #galaxy-canvas {
        z-index: 0;
        width: 100%;
        height: 100%;
        display: block;
        pointer-events: none;
      }

      #scene {
        z-index: 1;
      }

      .vignette {
        position: fixed;
        inset: 0;
        z-index: 2;
        pointer-events: none;
        background:
          radial-gradient(ellipse at 50% 38%, rgba(42, 65, 103, 0.16), transparent 48%),
          radial-gradient(ellipse at 28% 72%, rgba(84, 56, 118, 0.08), transparent 42%),
          radial-gradient(ellipse at 50% 100%, rgba(206, 152, 69, 0.2), transparent 32%),
          linear-gradient(180deg, transparent 0 70%, rgba(1, 3, 7, 0.05) 76%, rgba(0, 0, 0, 0.52) 100%),
          radial-gradient(circle at 50% 44%, rgba(2, 8, 20, 0) 0 50%, rgba(0, 0, 0, 0.2) 76%, rgba(0, 0, 0, 0.76) 100%);
      }

      .hud {
        position: fixed;
        inset: 0;
        z-index: 3;
        pointer-events: none;
      }

      .build-mark {
        position: fixed;
        left: 12px;
        bottom: 10px;
        z-index: 9;
        color: rgba(241, 223, 176, 0.28);
        font: 500 10px var(--ui-font);
        letter-spacing: 0.12em;
        pointer-events: none;
      }

      .layout-editor {
        pointer-events: auto;
        position: fixed;
        left: 16px;
        top: 16px;
        z-index: 12;
        width: min(330px, calc(100vw - 32px));
        display: none;
        gap: 10px;
        padding: 14px;
        border: 1px solid rgba(238, 179, 94, 0.36);
        border-radius: 8px;
        background: rgba(2, 7, 14, 0.86);
        color: rgba(255, 244, 214, 0.92);
        font-family: var(--ui-font);
        backdrop-filter: blur(16px);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.38);
      }

      .layout-editor.visible {
        display: grid;
      }

      .layout-editor h2 {
        margin: 0;
        color: var(--gold-3);
        font: 700 12px var(--ui-font);
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .layout-editor p {
        margin: 0;
        color: rgba(231, 216, 179, 0.7);
        font: 500 11px/1.4 var(--ui-font);
      }

      .layout-editor label {
        display: grid;
        gap: 5px;
        color: rgba(231, 216, 179, 0.78);
        font: 600 10px var(--ui-font);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .layout-editor select,
      .layout-editor input {
        width: 100%;
        min-height: 34px;
        border: 1px solid rgba(238, 179, 94, 0.24);
        border-radius: 6px;
        background: rgba(8, 14, 24, 0.86);
        color: #fff2c9;
        padding: 0 9px;
        font: 600 12px var(--ui-font);
      }

      .layout-editor__grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .layout-editor__actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .layout-editor button {
        min-height: 36px;
        border: 1px solid rgba(238, 179, 94, 0.28);
        border-radius: 6px;
        color: rgba(255, 244, 214, 0.9);
        background: rgba(238, 179, 94, 0.08);
        font: 700 11px var(--ui-font);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
      }

      .layout-editor button:hover,
      .layout-editor button:focus-visible {
        outline: none;
        border-color: rgba(255, 233, 152, 0.52);
        color: #fff8df;
        background: rgba(238, 179, 94, 0.14);
      }

      .layout-editor__status {
        min-height: 15px;
        color: rgba(255, 233, 152, 0.84);
        font: 600 10px var(--ui-font);
      }

      .layout-drag-handles {
        position: fixed;
        inset: 0;
        z-index: 10;
        pointer-events: none;
        display: none;
      }

      .layout-drag-handles.visible {
        display: block;
      }

      .layout-drag-handle {
        position: absolute;
        left: 0;
        top: 0;
        min-width: 58px;
        min-height: 58px;
        border: 1px dashed rgba(255, 233, 152, 0.44);
        border-radius: 50%;
        background: rgba(238, 179, 94, 0.035);
        box-shadow:
          0 0 0 9999px rgba(0, 0, 0, 0),
          0 0 24px rgba(238, 179, 94, 0.12);
        pointer-events: auto;
        cursor: grab;
        touch-action: none;
        transform: translate(-50%, -50%);
      }

      .layout-drag-handle::after {
        content: attr(data-label);
        position: absolute;
        left: 50%;
        top: calc(100% + 4px);
        transform: translateX(-50%);
        white-space: nowrap;
        color: rgba(255, 241, 206, 0.86);
        font: 700 10px var(--ui-font);
        letter-spacing: 0.04em;
        text-shadow: 0 1px 8px rgba(0, 0, 0, 0.72);
      }

      .layout-drag-handle.is-selected {
        border-style: solid;
        border-color: rgba(255, 233, 152, 0.86);
        background: rgba(238, 179, 94, 0.075);
        box-shadow:
          0 0 26px rgba(238, 179, 94, 0.24),
          inset 0 0 22px rgba(255, 233, 152, 0.08);
      }

      .layout-drag-handle.is-dragging {
        cursor: grabbing;
        border-color: rgba(255, 248, 223, 0.96);
      }

      .icon-preview-panel {
        pointer-events: auto;
        position: fixed;
        left: 16px;
        top: 92px;
        z-index: 8;
        width: min(360px, calc(100vw - 32px));
        max-height: calc(100vh - 124px);
        overflow: auto;
        padding: 14px;
        border: 1px solid rgba(209, 166, 91, 0.28);
        border-radius: 8px;
        background: rgba(2, 8, 14, 0.86);
        color: #d8c298;
        font-family: var(--ui-font);
        backdrop-filter: blur(12px);
      }

      .icon-preview-panel h2 {
        margin: 0 0 12px;
        font: 600 13px var(--ui-font);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .icon-preview-grid {
        display: grid;
        gap: 10px;
      }

      .icon-preview-item {
        display: grid;
        grid-template-columns: 56px 1fr;
        gap: 10px;
        align-items: center;
        padding: 8px;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.035);
      }

      .icon-preview-item img {
        width: 52px;
        height: 52px;
        object-fit: contain;
        color: #d1ad68;
      }

      .icon-preview-item strong {
        display: block;
        margin-bottom: 4px;
        font: 600 12px var(--ui-font);
      }

      .icon-preview-item code {
        display: block;
        white-space: pre-wrap;
        color: rgba(216, 194, 152, 0.72);
        font: 500 10px ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      .topbar {
        position: absolute;
        top: calc(var(--safe-top) + 18px);
        right: clamp(22px, 3.2vw, 44px);
        display: flex;
        align-items: flex-start;
        justify-content: flex-end;
      }

      .cart-button {
        pointer-events: auto;
        position: relative;
        width: 46px;
        height: 46px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(199, 154, 75, 0.32);
        border-radius: 12px;
        background: rgba(3, 8, 16, 0.54);
        color: #f1dfb0;
        backdrop-filter: blur(10px);
        cursor: pointer;
      }

      .cart-button span {
        position: absolute;
        top: -6px;
        right: -6px;
        min-width: 20px;
        height: 20px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: #b39560;
        color: #120f08;
        font: 800 11px var(--ui-font);
        opacity: 0;
      }

      .cart-button.has-items span {
        opacity: 1;
      }

      .scene-instruction {
        position: absolute;
        top: calc(var(--safe-top) + 26px);
        left: clamp(300px, 36vw, 620px);
        width: min(720px, calc(100vw - 160px));
        transform: none;
        display: grid;
        justify-items: start;
        gap: 4px;
        color: var(--gold-3);
        text-align: left;
        pointer-events: none;
      }

      .scene-instruction__lotus {
        color: rgba(241, 223, 176, 0.78);
        font: 700 11px var(--ui-font);
        line-height: 1.2;
        letter-spacing: 0.26em;
        text-transform: uppercase;
      }

      .scene-instruction__row {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 12px;
        width: 100%;
      }

      .scene-instruction__row::before,
      .scene-instruction__row::after {
        content: "";
        width: min(104px, 10vw);
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(179, 149, 96, 0.62), transparent);
      }

      .scene-instruction__row::before {
        display: none;
      }

      .scene-instruction h1 {
        margin: 0;
        color: #f1dfb0;
        font-family: var(--word-font);
        font-size: clamp(20px, 1.72vw, 30px);
        font-weight: 500;
        letter-spacing: 0.015em;
        line-height: 1.1;
        text-shadow: 0 1px 14px rgba(0, 0, 0, 0.32);
      }

      .scene-instruction__diamond {
        width: 6px;
        height: 6px;
        border: 1px solid rgba(179, 149, 96, 0.72);
        transform: rotate(45deg);
      }

      .service-sheet {
        pointer-events: auto;
        position: absolute;
        top: 150px;
        left: 54%;
        right: auto;
        bottom: calc(var(--safe-bottom) + 24px);
        width: clamp(640px, 52vw, 900px);
        min-width: 0;
        padding: 24px 26px;
        border: 0;
        border-radius: 8px;
        background:
          linear-gradient(180deg, rgba(5, 15, 18, 0.34), rgba(2, 9, 13, 0.24)),
          radial-gradient(circle at 18% 0%, rgba(241, 223, 176, 0.035), transparent 30%);
        backdrop-filter: blur(12px);
        box-shadow:
          0 24px 70px rgba(0, 0, 0, 0.22),
          inset 0 1px 0 rgba(241, 223, 176, 0.025);
        overflow: hidden;
        transform: translate(-50%, 30px) scale(0.96);
        opacity: 0;
        transition: transform 720ms cubic-bezier(0.16, 1, 0.3, 1), opacity 520ms ease;
      }

      .service-sheet.visible {
        transform: translate(-50%, 0) scale(1);
        opacity: 1;
      }

      .service-sheet.switching {
        transform: translate(-50%, 14px) scale(0.985);
        opacity: 0.42;
      }

      .focus-category-rail {
        pointer-events: none;
        position: absolute;
        z-index: 5;
        top: calc(var(--safe-top) + 116px);
        bottom: calc(var(--safe-bottom) + 34px);
        right: clamp(44px, 5.4vw, 92px);
        width: clamp(190px, 13.5vw, 248px);
        display: grid;
        align-content: start;
        gap: clamp(14px, 2.2vh, 22px);
        overflow-y: auto;
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
        padding: 8px 8px 24px;
        scrollbar-width: thin;
        scrollbar-color: rgba(209, 166, 91, 0.52) transparent;
        opacity: 0;
        transform: translate3d(24px, 0, 0) scale(0.96);
        transition: opacity 520ms ease, transform 720ms cubic-bezier(0.16, 1, 0.3, 1);
      }

      .focus-category-rail::-webkit-scrollbar {
        width: 4px;
      }

      .focus-category-rail::-webkit-scrollbar-track {
        background: transparent;
      }

      .focus-category-rail::-webkit-scrollbar-thumb {
        border-radius: 999px;
        background: rgba(209, 166, 91, 0.42);
      }

      .focus-category-rail.visible {
        pointer-events: auto;
        opacity: 1;
        transform: translate3d(0, 0, 0) scale(1);
      }

      .focus-category-button {
        position: relative;
        min-height: 82px;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: clamp(10px, 0.9vw, 14px);
        border: 0;
        background: transparent;
        color: rgba(241, 223, 176, 0.78);
        font-family: var(--word-font);
        cursor: pointer;
        padding: 0 2px;
        text-align: left;
      }

      .focus-category-orb {
        position: relative;
        width: clamp(74px, 5.7vw, 92px);
        aspect-ratio: 1;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 58%, rgba(8, 20, 19, 0.3), rgba(2, 8, 12, 0.12) 72%);
        box-shadow:
          inset 0 0 0 1px rgba(209, 166, 91, 0.2),
          0 16px 42px rgba(0, 0, 0, 0.22);
      }

      .focus-category-orb::before,
      .focus-category-orb::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
      }

      .focus-category-orb::before {
        inset: -10px;
        border: 1px solid rgba(209, 166, 91, 0.12);
      }

      .focus-category-orb::after {
        inset: -18px -26px;
        border: 1px solid rgba(209, 166, 91, 0.08);
        transform: rotate(-10deg) scaleY(0.48);
      }

      .focus-category-orb img {
        position: relative;
        z-index: 1;
        width: 58%;
        max-height: 58%;
        object-fit: contain;
        filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.32));
      }

      .focus-category-label {
        flex: 1;
        min-width: 0;
        max-width: none;
        color: rgba(248, 226, 182, 0.9);
        font-size: clamp(15px, 1.05vw, 18px);
        line-height: 1.04;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
      }

      .focus-category-button small {
        color: rgba(209, 166, 91, 0.72);
        font: 500 11px var(--ui-font);
      }

      .focus-category-button:hover,
      .focus-category-button:focus-visible {
        outline: none;
        color: rgba(255, 248, 232, 0.96);
      }

      .focus-category-button:hover .focus-category-orb,
      .focus-category-button:focus-visible .focus-category-orb {
        box-shadow:
          inset 0 0 0 1px rgba(241, 223, 176, 0.42),
          0 0 24px rgba(238, 179, 94, 0.2),
          0 18px 48px rgba(0, 0, 0, 0.28);
      }

      .sheet-scroll {
        height: 100%;
        overflow: auto;
        padding-right: 4px;
      }

      .sheet-kicker {
        margin: 0 0 8px;
        color: rgba(245, 222, 162, 0.72);
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .sheet-title {
        margin: 0 0 14px;
        color: var(--gold-3);
        font-family: var(--word-font);
        font-size: 28px;
        line-height: 1.08;
        font-weight: 500;
      }

      .service-card {
        display: grid;
        grid-template-columns: 112px minmax(0, 1fr) 128px 150px;
        align-items: center;
        gap: 18px;
        margin-bottom: 14px;
        padding: 8px;
        border: 0;
        border-radius: 8px;
        background: linear-gradient(90deg, rgba(5, 15, 18, 0.2), rgba(8, 18, 20, 0.1));
        box-shadow: inset 0 1px 0 rgba(241, 223, 176, 0.025), 0 18px 44px rgba(0, 0, 0, 0.1);
        animation: serviceItemIn 520ms cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .service-card img {
        width: 112px;
        height: 70px;
        border-radius: 6px;
        object-fit: cover;
        background: #1d1d1e;
        border: 0;
      }

      .service-card h3 {
        margin: 0 0 8px;
        color: #fff9e9;
        font-family: var(--word-font);
        font-size: 20px;
        line-height: 1.1;
        font-weight: 700;
      }

      .service-card p {
        margin: 0 0 8px;
        color: rgba(221, 224, 232, 0.7);
        font-family: Inter, system-ui, sans-serif;
        font-size: 14px;
        line-height: 1.42;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 0;
        color: rgba(245, 222, 162, 0.78);
        font-family: Inter, system-ui, sans-serif;
        font-size: 12px;
      }

      .ghost-button {
        width: 44px;
        height: 44px;
        display: grid;
        place-items: center;
        border: 0;
        border-radius: 50%;
        color: #ffd77a;
        background: rgba(43, 55, 78, 0.92);
        padding: 0;
        font-family: Inter, system-ui, sans-serif;
        font-size: 31px;
        line-height: 1;
        cursor: pointer;
      }

      .ghost-button:hover,
      .ghost-button:focus-visible {
        color: #fff8d8;
        outline: none;
        text-shadow: 0 0 18px rgba(255, 240, 189, 0.38);
      }

      .service-actions {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
      }

      .book-now-button,
      .add-cart-button {
        min-height: 38px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 500;
      }

      .book-now-button {
        min-width: 92px;
        padding: 0 12px;
        border: 0;
        background: rgba(3, 12, 15, 0.08);
        color: rgba(241, 223, 176, 0.82);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-family: var(--ui-font);
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .add-cart-button {
        width: 38px;
        height: 38px;
        border: 0;
        background: rgba(3, 12, 15, 0.12);
        color: rgba(241, 223, 176, 0.78);
        display: grid;
        place-items: center;
      }

      .book-now-button:hover,
      .book-now-button:focus-visible,
      .add-cart-button:hover,
      .add-cart-button:focus-visible {
        background: rgba(10, 20, 24, 0.18);
        color: rgba(255, 248, 232, 0.94);
        outline: none;
      }

      .service-price {
        display: grid;
        gap: 8px;
        border-left: 0;
        padding-left: 18px;
        color: rgba(255, 248, 232, 0.9);
        font-family: var(--word-font);
        font-size: 18px;
      }

      .service-price span {
        color: rgba(231, 216, 179, 0.78);
        font: 500 12px var(--ui-font);
      }

      .cart-notification {
        position: fixed;
        z-index: 7;
        top: calc(var(--safe-top) + 70px);
        right: 30px;
        max-width: min(360px, calc(100vw - 60px));
        padding: 12px 16px;
        border: 1px solid rgba(245, 222, 162, 0.42);
        border-radius: 999px;
        background: rgba(3, 9, 19, 0.82);
        color: var(--gold-3);
        opacity: 0;
        transform: translateY(-8px);
        transition: opacity 220ms ease, transform 220ms ease;
      }

      .cart-notification.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .cart-drawer {
        pointer-events: auto;
        display: none;
        z-index: 8;
        padding: 24px;
        position: fixed;
        top: 24px;
        right: 24px;
        width: min(420px, calc(100vw - 32px));
        max-height: calc(100vh - 48px);
        background: linear-gradient(
          145deg,
          rgba(10, 16, 34, 0.86),
          rgba(4, 8, 20, 0.78)
        );
        backdrop-filter: blur(22px) saturate(130%);
        -webkit-backdrop-filter: blur(22px) saturate(130%);
        border: 0;
        border-radius: 22px;
        box-shadow:
          0 28px 90px rgba(0, 0, 0, 0.52),
          0 0 30px rgba(203, 160, 72, 0.06),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
        overflow: auto;
      }

      .cart-drawer.visible {
        display: block;
      }

      .cart-drawer header,
      .cart-drawer footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .cart-drawer h2 {
        margin: 0;
        font-family: var(--word-font);
        color: var(--gold-3);
      }

      .cart-drawer article {
        display: grid;
        grid-template-columns: 64px minmax(0, 1fr);
        gap: 12px;

            baseAlpha: depth * 0.6 + 0.3,

          };
        }

        function resizeGalaxy() {
          const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
          width = window.innerWidth;
          height = window.innerHeight;
          galaxyCanvas.width = Math.floor(width * dpr);
          galaxyCanvas.height = Math.floor(height * dpr);
          galaxyCanvas.style.width = `${width}px`;
          galaxyCanvas.style.height = `${height}px`;
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          const starCount = Math.max(220, Math.floor((width * height) / 2600));
          galaxyStars = Array.from({ length: starCount }, makeGalaxyStar);
        }

        function spawnShootingStar() {
          const startX = Math.random() * width * 0.6 + width * 0.2;
          const startY = Math.random() * height * 0.2;
          const angle = Math.PI / 4 + (Math.random() - 0.5) * 0.3;
          shootingStars.push({
            x: startX,
            y: startY,
            vx: Math.cos(angle) * 9,
            vy: Math.sin(angle) * 9,
            life: 1,
            length: Math.random() * 80 + 60,
          });
        }

        function drawGalaxyStars(time) {
          for (const star of galaxyStars) {
            star.x += star.drift;
            if (star.x < 0) star.x = width;
            if (star.x > width) star.x = 0;

            const twinkle = Math.sin(time * star.twinkleSpeed + star.twinklePhase) * 0.35 + 0.65;
            const alpha = Math.min(1, star.baseAlpha * twinkle);
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
            ctx.fillStyle = star.hue === "gold"
              ? `rgba(240, 210, 150, ${alpha})`
              : `rgba(255, 255, 255, ${alpha})`;
            ctx.shadowBlur = star.radius > 1.2 ? 6 : 0;
            ctx.shadowColor = star.hue === "gold" ? "rgba(240,210,150,0.8)" : "rgba(255,255,255,0.6)";
            ctx.fill();

              star.y - star.vy * (star.length / 9)

            grad.addColorStop(0, `rgba(255, 250, 220, ${star.life})`);

            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(star.x, star.y);
            ctx.lineTo(star.x - star.vx * (star.length / 9), star.y - star.vy * (star.length / 9));

            star.y += star.vy;
            star.life -= 0.02;

      function makeStoneTexture() {
        const c = document.createElement("canvas");
        c.width = 512;
        c.height = 512;
        const ctx = c.getContext("2d");
        const img = ctx.createImageData(c.width, c.height);
        for (let y = 0; y < c.height; y++) {
          for (let x = 0; x < c.width; x++) {
            const i = (y * c.width + x) * 4;
            const wave = Math.sin(x * 0.035 + y * 0.014) * 5 + Math.sin((x + y) * 0.018) * 4;
            const grain = (Math.random() - 0.5) * 18;
            const v = Math.max(14, Math.min(42, 26 + wave + grain));
            img.data[i] = v;
            img.data[i + 1] = v + 3;
            img.data[i + 2] = v + 7;
            img.data[i + 3] = 255;
          }
        }
        ctx.putImageData(img, 0, 0);
        const vignette = ctx.createRadialGradient(256, 230, 40, 256, 256, 260);
        vignette.addColorStop(0, "rgba(255,255,255,0.05)");
        vignette.addColorStop(0.55, "rgba(0,0,0,0)");
        vignette.addColorStop(1, "rgba(0,0,0,0.34)");
        ctx.fillStyle = vignette;
        ctx.fillRect(0, 0, 512, 512);
        const texture = new THREE.CanvasTexture(c);
        texture.colorSpace = THREE.SRGBColorSpace;
        texture.wrapS = THREE.RepeatWrapping;
        texture.wrapT = THREE.RepeatWrapping;
        texture.anisotropy = 4;
        return texture;
      }

      function normalizeSvgGeometries(geometries, targetSize) {
        const box = new THREE.Box3();
        geometries.forEach((geometry) => {
          geometry.computeBoundingBox();
          if (geometry.boundingBox) box.union(geometry.boundingBox);
        });

        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);
        const maxDimension = Math.max(size.x, size.y);
        if (!Number.isFinite(maxDimension) || maxDimension <= 0) {
          throw new Error("SVG geometry has an invalid bounding box");
        }

        const fitScale = targetSize / maxDimension;
        geometries.forEach((geometry) => {
          geometry.translate(-center.x, -center.y, -center.z);
          geometry.scale(fitScale, -fitScale, fitScale);
          geometry.computeVertexNormals();
          geometry.computeBoundingBox();
        });
      }

      function createGoldIconMaterial(texture, asset) {
        const modeIndex = { "gold-mask": 0, "gold-duotone": 1, original: 2, monochrome: 3, cover: 2 }[asset.mode || "gold-mask"] ?? 0;
        return new THREE.ShaderMaterial({
          transparent: true,
          depthWrite: false,
          uniforms: {
            uMap: { value: texture },
            uMode: { value: modeIndex },
            uOpacity: { value: asset.opacity ?? 0.9 },
            uKeyBackground: { value: asset.removeBackground ? 1 : 0 },
            uShadow: { value: GOLD.shadow },
            uMain: { value: GOLD.main },
            uHighlight: { value: GOLD.highlight },
          },
          vertexShader: `
            varying vec2 vUv;
            void main() {
              vUv = uv;
              gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
          `,
          fragmentShader: `
            uniform sampler2D uMap;
            uniform int uMode;
            uniform float uOpacity;
            uniform float uKeyBackground;
            uniform vec3 uShadow;
            uniform vec3 uMain;
            uniform vec3 uHighlight;
            varying vec2 vUv;
            void main() {
              vec4 tex = texture2D(uMap, vUv);
              float lum = dot(tex.rgb, vec3(0.299, 0.587, 0.114));
              float chroma = max(max(tex.r, tex.g), tex.b);
              float alpha = tex.a;
              if (uKeyBackground > 0.5) {
                float keep = smoothstep(0.08, 0.24, max(lum, chroma));
                alpha *= keep;
              }
              if (uMode == 0) {
                alpha *= smoothstep(0.06, 0.42, max(alpha, 1.0 - lum));
              }
              if (alpha < 0.025) discard;
              vec3 gold = mix(uShadow, uMain, smoothstep(0.0, 0.64, vUv.y));
              gold = mix(gold, uHighlight, smoothstep(0.58, 1.0, vUv.y) * 0.72);
              vec3 color = gold;
              if (uMode == 1) color = mix(uShadow, uHighlight, lum);
              if (uMode == 2) color = tex.rgb;
              if (uMode == 3) color = vec3(lum);
              if (uKeyBackground > 0.5 && uMode == 2) {
                color = mix(min(tex.rgb * 1.55, vec3(1.0)), uHighlight, 0.2);
              }
              gl_FragColor = vec4(color, alpha * uOpacity);
            }
          `,
        });
      }

      function makeTextTexture(lines, options = {}) {
        const c = document.createElement("canvas");
        const requestedFontSize = options.fontSize || 44;
        c.width = requestedFontSize >= 120 ? 1792 : 768;
        c.height = requestedFontSize >= 120 ? 768 : 256;
        const ctx = c.getContext("2d");
        ctx.clearRect(0, 0, c.width, c.height);
        ctx.fillStyle = options.color || "#d8c298";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.shadowColor = "rgba(0,0,0,.68)";
        ctx.shadowBlur = 5;
        const fontSize = requestedFontSize;
        ctx.font = `500 ${fontSize}px Abramo, "EB Garamond", Georgia, serif`;
        const arr = Array.isArray(lines) ? lines : [lines];
        const lineHeight = fontSize * 1.04;
        const hasCount = Boolean(options.count);
        const start = c.height / 2 - ((arr.length - 1) * lineHeight) / 2 - (hasCount ? fontSize * 0.24 : 0);
        const tracking = options.tracking ?? fontSize * 0.025;
        function drawTrackedText(line, x, y) {
          const chars = Array.from(line);
          const width = chars.reduce((sum, char) => sum + ctx.measureText(char).width, 0) + tracking * Math.max(0, chars.length - 1);
          let cursor = x - width / 2;
          chars.forEach((char) => {
            const charWidth = ctx.measureText(char).width;
            ctx.fillText(char, cursor + charWidth / 2, y);
            cursor += charWidth + tracking;
          });
        }
        arr.forEach((line, idx) => drawTrackedText(line, c.width / 2, start + idx * lineHeight));
        if (hasCount) {
          ctx.shadowBlur = 0;
          ctx.fillStyle = options.countColor || "#a99672";
          ctx.font = `400 ${Math.round(fontSize * 0.46)}px Abramo, "EB Garamond", Georgia, serif`;
          drawTrackedText(options.count, c.width / 2, start + arr.length * lineHeight + 24);
        }
        const texture = new THREE.CanvasTexture(c);
        texture.colorSpace = THREE.SRGBColorSpace;
        texture.anisotropy = 8;
        return texture;
      }

      function makeOrbitLetterTexture(char) {
        const cacheKey = `orbit-letter:${char}`;

      function makeOrbitingLabel(text, size, categoryId) {
        const group = new THREE.Group();
        const chars = Array.from(text);
        const visibleCount = chars.filter((char) => char !== " ").length;
        const arcSpan = Math.min(Math.PI * 0.92, Math.max(Math.PI * 0.48, chars.length * 0.12));
        const wrapRadius = size * (chars.length > 12 ? 0.86 : 0.76);
        const letterWidth = size * (chars.length > 12 ? 0.135 : 0.155);
        const letterHeight = size * 0.24;
        const materials = [];
        let visibleIndex = 0;

        chars.forEach((char, index) => {
          if (char === " ") return;
          const t = chars.length === 1 ? 0.5 : index / Math.max(1, chars.length - 1);
          const theta = -arcSpan / 2 + t * arcSpan;
          const texture = makeOrbitLetterTexture(char);
          const depth = Math.abs(Math.sin(theta));
          const centerWeight = Math.max(0, Math.cos(theta));

          const glowMaterial = new THREE.MeshBasicMaterial({
            map: texture,
            transparent: true,
            opacity: 0.1 + centerWeight * 0.04,
            depthWrite: false,
            depthTest: false,
            blending: THREE.AdditiveBlending,
          });
          glowMaterial.userData.isOrbitTextGlow = true;
          const material = new THREE.MeshBasicMaterial({
            map: texture,
            transparent: true,
            opacity: 0.78 + centerWeight * 0.18,
            depthWrite: false,
            depthTest: false,
          });
          material.userData.isOrbitTextMain = true;

          const charGroup = new THREE.Group();
          const glow = new THREE.Mesh(new THREE.PlaneGeometry(letterWidth * 1.12, letterHeight * 1.12), glowMaterial);
          const mesh = new THREE.Mesh(new THREE.PlaneGeometry(letterWidth, letterHeight), material);
          mesh.renderOrder = 17;
          glow.renderOrder = 16;
          charGroup.add(glow, mesh);
          charGroup.position.set(
            Math.sin(theta) * wrapRadius,
            -size * 0.035 + Math.cos(theta * 1.35) * size * 0.028,
            -depth * size * 0.2
          );
          charGroup.rotation.y = -theta * 0.76;
          charGroup.rotation.z = theta * 0.08;
          const sideScale = 0.72 + centerWeight * 0.34;
          charGroup.scale.setScalar(sideScale);
          charGroup.userData.baseScale = sideScale;
          charGroup.userData.letterIndex = visibleIndex;
          charGroup.userData.isOrbitTextLetter = true;
          group.add(charGroup);
          materials.push(material, glowMaterial);
          visibleIndex += 1;
        });

        const seed = categoryId.split("").reduce((sum, char) => sum + char.charCodeAt(0), 0);
        group.userData.isOrbitingLabel = true;
        group.userData.textMaterials = materials;
        group.userData.orbitAngle = ((seed % 360) / 180) * Math.PI;
        group.userData.orbitSpeed = 0.05 + (seed % 5) * 0.006;
        group.userData.orbitRadius = size * 0.74;
        group.userData.orbitScaleY = 0.36;
        group.userData.orbitScaleZ = 0.18;
        group.userData.baseScale = 1;
        group.userData.distantOpacity = categoryId === "ear-care" || categoryId === "nail-care" ? 0.76 : 1;
        group.userData.visibleLetterCount = visibleCount;
        return group;
      }

      function makeStars() {
        const isMobile = responsiveKey() === "mobile";
        const count = isMobile ? 1600 : 5200;
        const positions = new Float32Array(count * 3);
        const colors = new Float32Array(count * 3);
        for (let i = 0; i < count; i++) {
          const layer = Math.random();
          const depth = layer < 0.68 ? -14 - Math.random() * 22 : -3.4 - Math.random() * 10;
          const x = (Math.random() - 0.5) * (layer < 0.68 ? 26 : 18);
          const y = (Math.random() - 0.5) * (layer < 0.68 ? 14 : 10.5);
          positions[i * 3] = x;
          positions[i * 3 + 1] = y;
          positions[i * 3 + 2] = depth;
          const warm = Math.random() > 0.78;
          const color = new THREE.Color(warm ? "#f0d29a" : "#abc9f5");
          const titleClear = Math.abs(x) < 2.55 && y > 1.0 && y < 2.1;
          const dimMask = titleClear ? 0.16 : 1;
          const dim = (layer < 0.68 ? 0.18 + Math.random() * 0.44 : 0.34 + Math.random() * 0.86) * dimMask;
          colors[i * 3] = color.r * dim;
          colors[i * 3 + 1] = color.g * dim;
          colors[i * 3 + 2] = color.b * dim;
        }
        const geo = new THREE.BufferGeometry();
        geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
        geo.setAttribute("color", new THREE.BufferAttribute(colors, 3));
        const mat = new THREE.PointsMaterial({ size: isMobile ? 0.016 : 0.012, vertexColors: true, transparent: true, opacity: 0.96, depthWrite: false });
        const stars = new THREE.Points(geo, mat);
        scene.add(stars);
        return stars;
      }

      function makeMilkyWayBand() {
        const isMobile = responsiveKey() === "mobile";
        const group = new THREE.Group();
        const layerConfigs = [
          { count: isMobile ? 900 : 2600, z: -19, spread: 1.0, size: isMobile ? 0.014 : 0.01, opacity: 0.54 },
          { count: isMobile ? 520 : 1500, z: -10, spread: 0.66, size: isMobile ? 0.02 : 0.016, opacity: 0.68 },
          { count: isMobile ? 130 : 420, z: -4.6, spread: 0.34, size: isMobile ? 0.03 : 0.024, opacity: 0.82 },
        ];

        layerConfigs.forEach((config, layerIndex) => {
          const positions = new Float32Array(config.count * 3);
          const colors = new Float32Array(config.count * 3);
          for (let i = 0; i < config.count; i++) {
            const t = Math.random();
            const diagonalX = (t - 0.5) * 18.8;
            const bandY = 1.48 - t * 2.72 + Math.sin(t * Math.PI * 2.4) * 0.34;
            const jitter = (Math.random() - 0.5) * config.spread;
            const fineJitter = (Math.random() - 0.5) * config.spread * 2.1;
            positions[i * 3] = diagonalX + fineJitter;
            positions[i * 3 + 1] = bandY + jitter;
            positions[i * 3 + 2] = config.z - Math.random() * 5.5;

            const warmDust = Math.random() > 0.38;
            const color = new THREE.Color(warmDust ? "#e7bf78" : "#d8e5ff");
            const coreBoost = 1 - Math.min(1, Math.abs(jitter) / Math.max(0.001, config.spread));
            const dim = 0.22 + Math.random() * 0.64 + coreBoost * 0.42;
            colors[i * 3] = color.r * dim;
            colors[i * 3 + 1] = color.g * dim;
            colors[i * 3 + 2] = color.b * dim;
          }

          const geo = new THREE.BufferGeometry();
          geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
          geo.setAttribute("color", new THREE.BufferAttribute(colors, 3));
          const mat = new THREE.PointsMaterial({
            size: config.size,
            vertexColors: true,
            transparent: true,
            opacity: config.opacity,
            depthWrite: false,
            blending: THREE.AdditiveBlending,
          });
          const layer = new THREE.Points(geo, mat);
          layer.userData.depthLayer = layerIndex;
          group.add(layer);
        });

        scene.add(group);
        return group;
      }

      function makeNebula() {
        const geo = new THREE.PlaneGeometry(18, 10, 1, 1);
        const mat = new THREE.ShaderMaterial({
          depthWrite: false,
          depthTest: false,
          transparent: true,
          uniforms: { uTime: { value: 0 } },
          vertexShader: `
            varying vec2 vUv;
            void main() {
              vUv = uv;
              gl_Position = vec4(position.xy / vec2(9.0, 5.0), 0.0, 1.0);
            }
          `,
          fragmentShader: `
            precision highp float;
            varying vec2 vUv;
            uniform float uTime;
            float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123); }
            float noise(vec2 p) {
              vec2 i = floor(p);
              vec2 f = fract(p);
              float a = hash(i);
              float b = hash(i + vec2(1., 0.));
              float c = hash(i + vec2(0., 1.));
              float d = hash(i + vec2(1., 1.));
              vec2 u = f * f * (3. - 2. * f);
              return mix(a, b, u.x) + (c - a) * u.y * (1. - u.x) + (d - b) * u.x * u.y;
            }
            void main() {
              vec2 p = vUv * 3.2 + vec2(uTime * 0.008, -uTime * 0.004);
              float n = noise(p) * 0.55 + noise(p * 2.1) * 0.28 + noise(p * 4.0) * 0.14;
              float band = smoothstep(0.04, 0.78, 1.0 - abs(vUv.y - 0.45) * 2.0);
              float milky = smoothstep(0.26, 0.0, abs((vUv.y - 0.68) - (vUv.x - 0.12) * -0.32));
              float core = smoothstep(0.08, 0.0, abs((vUv.y - 0.64) - (vUv.x - 0.2) * -0.28));
              float horizon = smoothstep(0.0, 0.34, 1.0 - abs(vUv.y - 0.1) * 3.2);
              vec3 col = mix(vec3(0.005, 0.022, 0.05), vec3(0.045, 0.08, 0.15), n);
              col += vec3(0.16, 0.12, 0.052) * milky * (0.5 + n * 0.74);
              col += vec3(0.22, 0.16, 0.075) * core * (0.35 + n * 0.5);
              col += vec3(0.055, 0.036, 0.11) * smoothstep(0.52, 0.92, n);
              col += vec3(0.11, 0.075, 0.034) * horizon * (0.16 + n * 0.24);
              gl_FragColor = vec4(col, band * n * 0.68 + milky * 0.54 + core * 0.22 + horizon * 0.08);
            }
          `,
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.renderOrder = -10;
        scene.add(mesh);
        return mesh;
      }

      function makeHorizon() {
        const geo = new THREE.PlaneGeometry(18, 10, 1, 1);
        const mat = new THREE.ShaderMaterial({
          depthWrite: false,
          depthTest: false,
          transparent: true,
          uniforms: { uTime: { value: 0 } },
          vertexShader: `
            varying vec2 vUv;
            void main() {
              vUv = uv;
              gl_Position = vec4(position.xy / vec2(9.0, 5.0), 0.0, 1.0);
            }
          `,
          fragmentShader: `
            precision highp float;
            varying vec2 vUv;
            uniform float uTime;
            float line(float y, float w) { return smoothstep(w, 0.0, abs(vUv.y - y)); }
            void main() {
              float glow = smoothstep(0.0, 0.5, vUv.y) * smoothstep(0.42, 0.12, vUv.y);
              float drift = sin((vUv.x * 16.0) + uTime * 0.28) * 0.003;
              float water = line(0.115 + drift, 0.004) + line(0.095 - drift, 0.0025) * 0.55;
              float islands = smoothstep(0.25, 0.0, abs(vUv.y - 0.13)) * smoothstep(0.94, 0.28, abs(vUv.x - 0.5));
              vec3 gold = vec3(0.76, 0.48, 0.19);
              vec3 blue = vec3(0.02, 0.05, 0.1);
              vec3 col = mix(blue, gold, water * 0.9 + glow * 0.26);
              float alpha = glow * 0.22 + water * 0.32 + islands * 0.04;
              gl_FragColor = vec4(col, alpha);
            }
          `,
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.renderOrder = -8;
        scene.add(mesh);
        return mesh;
      }

      function makeSoftDustTexture() {

        gradient.addColorStop(0, "rgba(255,232,170,0.36)");
        gradient.addColorStop(0.34, "rgba(220,150,76,0.13)");
        gradient.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 256, 256);
        const texture = new THREE.CanvasTexture(c);
        texture.colorSpace = THREE.SRGBColorSpace;
        return texture;

      function safeWorldBounds(key) {
        const bounds = {
          largeDesktop: { minX: -4.2, maxX: 4.2, minY: -2.95, maxY: 2.75 },
          desktop: { minX: -3.95, maxX: 3.95, minY: -2.72, maxY: 2.54 },

          mobile: { minX: -2.32, maxX: 2.32, minY: -1.72, maxY: 1.72 },
        };
        return bounds[key] || bounds.desktop;
      }

      function clampLayoutToSafeZone(layout, key) {
        const bounds = safeWorldBounds(key);
        return {
          ...layout,
          x: THREE.MathUtils.clamp(layout.x, bounds.minX, bounds.maxX),
          y: THREE.MathUtils.clamp(layout.y, bounds.minY, bounds.maxY),
        };
      }

      function addPlanetBreathingRoom(layout, key) {
        const spacing = {
          largeDesktop: { x: 1.06, y: 1.04 },

          tabletLandscape: { x: 1.03, y: 1.025 },
          tabletPortrait: { x: 1.04, y: 1.04 },
          mobile: { x: 1, y: 1 },
        }[key] || { x: 1.04, y: 1.03 };
        return {
          ...layout,
          x: layout.x * spacing.x,
          y: layout.y * spacing.y,
        };

        const base = category.position[key] || category.position.desktop || category.position.largeDesktop;

        const layout = override ? { ...base, ...override } : base;
        return layoutEditorEnabled ? layout : addPlanetBreathingRoom(layout, key);
