<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Ngân Hà Spa - Celestial 3D Category Demo</title>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="celestial-style.css?v=2.5">
<style>
@import url("https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap");

      @font-face {
        font-family: "Abramo";
        src: local("Abramo");
        font-display: swap;
      }

      :root {
        --bg: #01040a;
        --deep: #07111e;
        --panel: rgba(3, 8, 17, 0.7);
        --panel-strong: rgba(7, 12, 21, 0.9);
        --gold: #b8893f;
        --gold-2: #d1ad68;
        --gold-3: #f1dfb0;
        --text: #f1dfb0;
        --muted: #bca87e;
        --word-font: "EB Garamond", "Abramo", Georgia, "Times New Roman", serif;
        --ui-font: Inter, system-ui, sans-serif;
        --safe-top: max(env(safe-area-inset-top), 18px);
        --safe-bottom: max(env(safe-area-inset-bottom), 18px);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
        color: var(--text);
        font-family: var(--word-font);
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        border: 0;
        background: transparent;
        font-family: var(--word-font);
      }

      #app,
      #scene, #cel-scene-celestial,
      #galaxy-canvas,
      .galaxy-nebula {
        position: fixed;
        inset: 0;
        touch-action: none;
      }

      .galaxy-nebula {
        z-index: 0;
        pointer-events: none;
        background:
          radial-gradient(ellipse 62% 42% at 18% 20%, rgba(212, 175, 85, 0.18), transparent 60%),
          radial-gradient(ellipse 55% 50% at 85% 25%, rgba(184, 122, 56, 0.20), transparent 62%),
          radial-gradient(ellipse 65% 55% at 80% 85%, rgba(120, 78, 38, 0.22), transparent 65%),
          radial-gradient(ellipse 70% 55% at 15% 90%, rgba(160, 95, 45, 0.16), transparent 65%),
          radial-gradient(ellipse 90% 70% at 50% 50%, rgba(90, 55, 25, 0.14), transparent 72%);
      }

      #galaxy-canvas {
        z-index: 0;
        width: 100%;
        height: 100%;
        display: block;
        pointer-events: none;
      }

      #scene {
        z-index: 1;
      }

      .vignette {
        position: fixed;
        inset: 0;
        z-index: 2;
        pointer-events: none;
        background:
          radial-gradient(ellipse at 50% 38%, rgba(184, 122, 56, 0.10), transparent 48%),
          radial-gradient(ellipse at 28% 72%, rgba(120, 78, 38, 0.08), transparent 42%),
          radial-gradient(ellipse at 50% 100%, rgba(212, 175, 85, 0.15), transparent 32%),
          linear-gradient(180deg, transparent 0 70%, rgba(42, 28, 14, 0.05) 76%, rgba(15, 10, 5, 0.52) 100%),
          radial-gradient(circle at 50% 44%, rgba(15, 10, 5, 0) 0 50%, rgba(15, 10, 5, 0.2) 76%, rgba(15, 10, 5, 0.76) 100%);
      }

      .hud {
        position: fixed;
        inset: 0;
        z-index: 3;
        pointer-events: none;
      }

      .build-mark {
        position: fixed;
        left: 12px;
        bottom: 10px;
        z-index: 9;
        color: rgba(241, 223, 176, 0.28);
        font: 500 10px var(--ui-font);
        letter-spacing: 0.12em;
        pointer-events: none;
      }

      .layout-editor {
        pointer-events: auto;
        position: fixed;
        left: 16px;
        top: 16px;
        z-index: 12;
        width: min(330px, calc(100vw - 32px));
        display: none;
        gap: 10px;
        padding: 14px;
        border: 1px solid rgba(238, 179, 94, 0.36);
        border-radius: 8px;
        background: rgba(2, 7, 14, 0.86);
        color: rgba(255, 244, 214, 0.92);
        font-family: var(--ui-font);
        backdrop-filter: blur(16px);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.38);
      }

      .layout-editor.visible {
        display: grid;
      }

      .layout-editor h2 {
        margin: 0;
        color: var(--gold-3);
        font: 700 12px var(--ui-font);
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .layout-editor p {
        margin: 0;
        color: rgba(231, 216, 179, 0.7);
        font: 500 11px/1.4 var(--ui-font);
      }

      .layout-editor label {
        display: grid;
        gap: 5px;
        color: rgba(231, 216, 179, 0.78);
        font: 600 10px var(--ui-font);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .layout-editor select,
      .layout-editor input {
        width: 100%;
        min-height: 34px;
        border: 1px solid rgba(238, 179, 94, 0.24);
        border-radius: 6px;
        background: rgba(8, 14, 24, 0.86);
        color: #fff2c9;
        padding: 0 9px;
        font: 600 12px var(--ui-font);
      }

      .layout-editor__grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .layout-editor__actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .layout-editor button {
        min-height: 36px;
        border: 1px solid rgba(238, 179, 94, 0.28);
        border-radius: 6px;
        color: rgba(255, 244, 214, 0.9);
        background: rgba(238, 179, 94, 0.08);
        font: 700 11px var(--ui-font);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
      }

      .layout-editor button:hover,
      .layout-editor button:focus-visible {
        outline: none;
        border-color: rgba(255, 233, 152, 0.52);
        color: #fff8df;
        background: rgba(238, 179, 94, 0.14);
      }

      .layout-editor__status {
        min-height: 15px;
        color: rgba(255, 233, 152, 0.84);
        font: 600 10px var(--ui-font);
      }

      .layout-drag-handles {
        position: fixed;
        inset: 0;
        z-index: 10;
        pointer-events: none;
        display: none;
      }

      .layout-drag-handles.visible {
        display: block;
      }

      .layout-drag-handle {
        position: absolute;
        left: 0;
        top: 0;
        min-width: 58px;
        min-height: 58px;
        border: 1px dashed rgba(255, 233, 152, 0.44);
        border-radius: 50%;
        background: rgba(238, 179, 94, 0.035);
        box-shadow:
          0 0 0 9999px rgba(0, 0, 0, 0),
          0 0 24px rgba(238, 179, 94, 0.12);
        pointer-events: auto;
        cursor: grab;
        touch-action: none;
        transform: translate(-50%, -50%);
      }

      .layout-drag-handle::after {
        content: attr(data-label);
        position: absolute;
        left: 50%;
        top: calc(100% + 4px);
        transform: translateX(-50%);
        white-space: nowrap;
        color: rgba(255, 241, 206, 0.86);
        font: 700 10px var(--ui-font);
        letter-spacing: 0.04em;
        text-shadow: 0 1px 8px rgba(0, 0, 0, 0.72);
      }

      .layout-drag-handle.is-selected {
        border-style: solid;
        border-color: rgba(255, 233, 152, 0.86);
        background: rgba(238, 179, 94, 0.075);
        box-shadow:
          0 0 26px rgba(238, 179, 94, 0.24),
          inset 0 0 22px rgba(255, 233, 152, 0.08);
      }

      .layout-drag-handle.is-dragging {
        cursor: grabbing;
        border-color: rgba(255, 248, 223, 0.96);
      }

      .icon-preview-panel {
        pointer-events: auto;
        position: fixed;
        left: 16px;
        top: 92px;
        z-index: 8;
        width: min(360px, calc(100vw - 32px));
        max-height: calc(100vh - 124px);
        overflow: auto;
        padding: 14px;
        border: 1px solid rgba(209, 166, 91, 0.28);
        border-radius: 8px;
        background: rgba(2, 8, 14, 0.86);
        color: #d8c298;
        font-family: var(--ui-font);
        backdrop-filter: blur(12px);
      }

      .icon-preview-panel h2 {
        margin: 0 0 12px;
        font: 600 13px var(--ui-font);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .icon-preview-grid {
        display: grid;
        gap: 10px;
      }

      .icon-preview-item {
        display: grid;
        grid-template-columns: 56px 1fr;
        gap: 10px;
        align-items: center;
        padding: 8px;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.035);
      }

      .icon-preview-item img {
        width: 52px;
        height: 52px;
        object-fit: contain;
        color: #d1ad68;
      }

      .icon-preview-item strong {
        display: block;
        margin-bottom: 4px;
        font: 600 12px var(--ui-font);
      }

      .icon-preview-item code {
        display: block;
        white-space: pre-wrap;
        color: rgba(216, 194, 152, 0.72);
        font: 500 10px ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      .topbar {
        position: absolute;
        top: calc(var(--safe-top) + 18px);
        right: clamp(22px, 3.2vw, 44px);
        display: flex;
        align-items: flex-start;
        justify-content: flex-end;
      }

      .cart-button {
        pointer-events: auto;
        position: relative;
        width: 46px;
        height: 46px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(199, 154, 75, 0.32);
        border-radius: 12px;
        background: rgba(3, 8, 16, 0.54);
        color: #f1dfb0;
        backdrop-filter: blur(10px);
        cursor: pointer;
      }

      .cart-button span {
        position: absolute;
        top: -6px;
        right: -6px;
        min-width: 20px;
        height: 20px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: #b39560;
        color: #120f08;
        font: 800 11px var(--ui-font);
        opacity: 0;
      }

      .cart-button.has-items span {
        opacity: 1;
      }

      .scene-instruction {
        position: absolute;
        top: calc(var(--safe-top) + 26px);
        left: clamp(300px, 36vw, 620px);
        width: min(720px, calc(100vw - 160px));
        transform: none;
        display: grid;
        justify-items: start;
        gap: 4px;
        color: var(--gold-3);
        text-align: left;
        pointer-events: none;
      }

      .scene-instruction__lotus {
        color: rgba(241, 223, 176, 0.78);
        font: 700 11px var(--ui-font);
        line-height: 1.2;
        letter-spacing: 0.26em;
        text-transform: uppercase;
      }

      .scene-instruction__row {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 12px;
        width: 100%;
      }

      .scene-instruction__row::before,
      .scene-instruction__row::after {
        content: "";
        width: min(104px, 10vw);
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(179, 149, 96, 0.62), transparent);
      }

      .scene-instruction__row::before {
        display: none;
      }

      .scene-instruction h1 {
        margin: 0;
        color: #f1dfb0;
        font-family: var(--word-font);
        font-size: clamp(20px, 1.72vw, 30px);
        font-weight: 500;
        letter-spacing: 0.015em;
        line-height: 1.1;
        text-shadow: 0 1px 14px rgba(0, 0, 0, 0.32);
      }

      .scene-instruction__diamond {
        width: 6px;
        height: 6px;
        border: 1px solid rgba(179, 149, 96, 0.72);
        transform: rotate(45deg);
      }

      .service-sheet {
        pointer-events: auto;
        position: absolute;
        top: 150px;
        left: 54%;
        right: auto;
        bottom: calc(var(--safe-bottom) + 24px);
        width: clamp(640px, 52vw, 900px);
        min-width: 0;
        padding: 24px 26px;
        border: 0;
        border-radius: 8px;
        background:
          linear-gradient(180deg, rgba(5, 15, 18, 0.34), rgba(2, 9, 13, 0.24)),
          radial-gradient(circle at 18% 0%, rgba(241, 223, 176, 0.035), transparent 30%);
        backdrop-filter: blur(12px);
        box-shadow:
          0 24px 70px rgba(0, 0, 0, 0.22),
          inset 0 1px 0 rgba(241, 223, 176, 0.025);
        overflow: hidden;
        transform: translate(-50%, 30px) scale(0.96);
        opacity: 0;
        transition: transform 720ms cubic-bezier(0.16, 1, 0.3, 1), opacity 520ms ease;
      }

      .service-sheet.visible {
        transform: translate(-50%, 0) scale(1);
        opacity: 1;
      }

      .service-sheet.switching {
        transform: translate(-50%, 14px) scale(0.985);
        opacity: 0.42;
      }

      .focus-category-rail {
        pointer-events: none;
        position: absolute;
        z-index: 5;
        top: calc(var(--safe-top) + 116px);
        bottom: calc(var(--safe-bottom) + 34px);
        right: clamp(44px, 5.4vw, 92px);
        width: clamp(190px, 13.5vw, 248px);
        display: grid;
        align-content: start;
        gap: clamp(14px, 2.2vh, 22px);
        overflow-y: auto;
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
        padding: 8px 8px 24px;
        scrollbar-width: thin;
        scrollbar-color: rgba(209, 166, 91, 0.52) transparent;
        opacity: 0;
        transform: translate3d(24px, 0, 0) scale(0.96);
        transition: opacity 520ms ease, transform 720ms cubic-bezier(0.16, 1, 0.3, 1);
      }

      .focus-category-rail::-webkit-scrollbar {
        width: 4px;
      }

      .focus-category-rail::-webkit-scrollbar-track {
        background: transparent;
      }

      .focus-category-rail::-webkit-scrollbar-thumb {
        border-radius: 999px;
        background: rgba(209, 166, 91, 0.42);
      }

      .focus-category-rail.visible {
        pointer-events: auto;
        opacity: 1;
        transform: translate3d(0, 0, 0) scale(1);
      }

      .focus-category-button {
        position: relative;
        min-height: 82px;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: clamp(10px, 0.9vw, 14px);
        border: 0;
        background: transparent;
        color: rgba(241, 223, 176, 0.78);
        font-family: var(--word-font);
        cursor: pointer;
        padding: 0 2px;
        text-align: left;
      }

      .focus-category-orb {
        position: relative;
        width: clamp(74px, 5.7vw, 92px);
        aspect-ratio: 1;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 58%, rgba(8, 20, 19, 0.3), rgba(2, 8, 12, 0.12) 72%);
        box-shadow:
          inset 0 0 0 1px rgba(209, 166, 91, 0.2),
          0 16px 42px rgba(0, 0, 0, 0.22);
      }

      .focus-category-orb::before,
      .focus-category-orb::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
      }

      .focus-category-orb::before {
        inset: -10px;
        border: 1px solid rgba(209, 166, 91, 0.12);
      }

      .focus-category-orb::after {
        inset: -18px -26px;
        border: 1px solid rgba(209, 166, 91, 0.08);
        transform: rotate(-10deg) scaleY(0.48);
      }

      .focus-category-orb img {
        position: relative;
        z-index: 1;
        width: 58%;
        max-height: 58%;
        object-fit: contain;
        filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.32));
      }

      .focus-category-label {
        flex: 1;
        min-width: 0;
        max-width: none;
        color: rgba(248, 226, 182, 0.9);
        font-size: clamp(15px, 1.05vw, 18px);
        line-height: 1.04;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
      }

      .focus-category-button small {
        color: rgba(209, 166, 91, 0.72);
        font: 500 11px var(--ui-font);
      }

      .focus-category-button:hover,
      .focus-category-button:focus-visible {
        outline: none;
        color: rgba(255, 248, 232, 0.96);
      }

      .focus-category-button:hover .focus-category-orb,
      .focus-category-button:focus-visible .focus-category-orb {
        box-shadow:
          inset 0 0 0 1px rgba(241, 223, 176, 0.42),
          0 0 24px rgba(238, 179, 94, 0.2),
          0 18px 48px rgba(0, 0, 0, 0.28);
      }

      .sheet-scroll {
        height: 100%;
        overflow: auto;
        padding-right: 4px;
      }

      .sheet-kicker {
        margin: 0 0 8px;
        color: rgba(245, 222, 162, 0.72);
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .sheet-title {
        margin: 0 0 14px;
        color: var(--gold-3);
        font-family: var(--word-font);
        font-size: 28px;
        line-height: 1.08;
        font-weight: 500;
      }

      .service-card {
        display: grid;
        grid-template-columns: 112px minmax(0, 1fr) 128px 150px;
        align-items: center;
        gap: 18px;
        margin-bottom: 14px;
        padding: 8px;
        border: 0;
        border-radius: 8px;
        background: linear-gradient(90deg, rgba(5, 15, 18, 0.2), rgba(8, 18, 20, 0.1));
        box-shadow: inset 0 1px 0 rgba(241, 223, 176, 0.025), 0 18px 44px rgba(0, 0, 0, 0.1);
        animation: serviceItemIn 520ms cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .service-card img {
        width: 112px;
        height: 70px;
        border-radius: 6px;
        object-fit: cover;
        background: #1d1d1e;
        border: 0;
      }

      .service-card h3 {
        margin: 0 0 8px;
        color: #fff9e9;
        font-family: var(--word-font);
        font-size: 20px;
        line-height: 1.1;
        font-weight: 700;
      }

      .service-card p {
        margin: 0 0 8px;
        color: rgba(221, 224, 232, 0.7);
        font-family: Inter, system-ui, sans-serif;
        font-size: 14px;
        line-height: 1.42;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 0;
        color: rgba(245, 222, 162, 0.78);
        font-family: Inter, system-ui, sans-serif;
        font-size: 12px;
      }

      .ghost-button {
        width: 44px;
        height: 44px;
        display: grid;
        place-items: center;
        border: 0;
        border-radius: 50%;
        color: #ffd77a;
        background: rgba(43, 55, 78, 0.92);
        padding: 0;
        font-family: Inter, system-ui, sans-serif;
        font-size: 31px;
        line-height: 1;
        cursor: pointer;
      }

      .ghost-button:hover,
      .ghost-button:focus-visible {
        color: #fff8d8;
        outline: none;
        text-shadow: 0 0 18px rgba(255, 240, 189, 0.38);
      }

      .service-actions {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
      }

      .book-now-button,
      .add-cart-button {
        min-height: 38px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 500;
      }

      .book-now-button {
        min-width: 92px;
        padding: 0 12px;
        border: 0;
        background: rgba(3, 12, 15, 0.08);
        color: rgba(241, 223, 176, 0.82);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-family: var(--ui-font);
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .add-cart-button {
        width: 38px;
        height: 38px;
        border: 0;
        background: rgba(3, 12, 15, 0.12);
        color: rgba(241, 223, 176, 0.78);
        display: grid;
        place-items: center;
      }

      .book-now-button:hover,
      .book-now-button:focus-visible,
      .add-cart-button:hover,
      .add-cart-button:focus-visible {
        background: rgba(10, 20, 24, 0.18);
        color: rgba(255, 248, 232, 0.94);
        outline: none;
      }

      .service-price {
        display: grid;
        gap: 8px;
        border-left: 0;
        padding-left: 18px;
        color: rgba(255, 248, 232, 0.9);
        font-family: var(--word-font);
        font-size: 18px;
      }

      .service-price span {
        color: rgba(231, 216, 179, 0.78);
        font: 500 12px var(--ui-font);
      }

      .cart-notification {
        position: fixed;
        z-index: 7;
        top: calc(var(--safe-top) + 70px);
        right: 30px;
        max-width: min(360px, calc(100vw - 60px));
        padding: 12px 16px;
        border: 1px solid rgba(245, 222, 162, 0.42);
        border-radius: 999px;
        background: rgba(3, 9, 19, 0.82);
        color: var(--gold-3);
        opacity: 0;
        transform: translateY(-8px);
        transition: opacity 220ms ease, transform 220ms ease;
      }

      .cart-notification.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .cart-drawer {
        pointer-events: auto;
        display: none;
        z-index: 8;
        padding: 24px;
        position: fixed;
        top: 24px;
        right: 24px;
        width: min(420px, calc(100vw - 32px));
        max-height: calc(100vh - 48px);
        background: linear-gradient(
          145deg,
          rgba(10, 16, 34, 0.86),
          rgba(4, 8, 20, 0.78)
        );
        backdrop-filter: blur(22px) saturate(130%);
        -webkit-backdrop-filter: blur(22px) saturate(130%);
        border: 0;
        border-radius: 22px;
        box-shadow:
          0 28px 90px rgba(0, 0, 0, 0.52),
          0 0 30px rgba(203, 160, 72, 0.06),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
        overflow: auto;
      }

      .cart-drawer.visible {
        display: block;
      }

      .cart-drawer header,
      .cart-drawer footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .cart-drawer h2 {
        margin: 0;
        font-family: var(--word-font);
        color: var(--gold-3);
      }

      .cart-drawer article {
        display: grid;
        grid-template-columns: 64px minmax(0, 1fr);
        gap: 12px;
        margin: 14px 0;
        padding: 10px;
        border: 0;
        background: transparent;
        border-radius: 8px;
      }

      .cart-drawer .detail-box {
        border: 0;
        background: transparent;
      }

      .cart-drawer img {
        width: 64px;
        height: 64px;
        object-fit: cover;
        border-radius: 8px;
      }

      .detail-box {
        margin-top: 12px;
        padding: 14px;
        border: 0;
        border-radius: 8px;
        background: transparent;
        animation: serviceItemIn 520ms cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      @keyframes serviceItemIn {
        from {
          opacity: 0;
          transform: translateY(18px) scale(0.985);
          filter: blur(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
          filter: blur(0);
        }
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .field {
        width: 100%;
        min-height: 42px;
        margin: 0 0 10px;
        border: 1px solid rgba(199, 154, 75, 0.22);

        color: var(--text);

        .topbar {
          left: 22px;
          right: 22px;
        }

        .service-sheet {
          top: 142px;
          left: 56%;
          bottom: calc(var(--safe-bottom) + 22px);
          width: min(620px, calc(100vw - 300px));
          padding: 20px;
        }

        .sheet-title {
          font-size: 24px;
        }

        }

          width: 86px;
          height: 58px;
          border-radius: 6px;
        }

        .service-card h3 {
          font-size: 18px;
        }

        .service-card p {
          font-size: 13px;
        }

        .service-price {
          padding-left: 12px;
          font-size: 15px;
        }

        .book-now-button {
          min-width: 82px;
          padding: 0 10px;
        }

        .focus-category-rail {
          top: calc(var(--safe-top) + 106px);
          bottom: calc(var(--safe-bottom) + 26px);
          right: 24px;
          width: 172px;
          gap: 12px;
        }

        .focus-category-button {
          min-height: 72px;
        }
      }

      .sr-list {
        position: absolute;
        left: -9999px;
        top: auto;
        width: 1px;
        height: 1px;
        overflow: hidden;
      }

      .mobile-arrows {
        position: fixed;
        z-index: 4;
        left: 18px;
        right: 18px;
        bottom: calc(var(--safe-bottom) + 14px);
        display: none;
        justify-content: space-between;
        pointer-events: none;
      }

      .mobile-arrow {
        pointer-events: auto;
        width: 46px;
        height: 46px;
        border: 1px solid rgba(179, 149, 96, 0.36);
        border-radius: 50%;
        color: #d8c298;
        background: rgba(3, 8, 16, 0.58);
        backdrop-filter: blur(10px);
      }

      @media (max-width: 820px) {
        .topbar {
          top: calc(var(--safe-top) + 10px);
          right: 14px;
        }

        .cart-button {
          width: 42px;
          height: 42px;
        }

        .service-sheet {
          top: auto;
          left: 10px;
          right: 10px;
          bottom: 10px;
          width: auto;
          min-width: 0;
          height: min(58vh, 520px);
          padding: 14px;
          transform: translateY(calc(100% + 34px));
          border-radius: 12px 12px 8px 8px;
        }

        .focus-category-rail {
          top: calc(var(--safe-top) + 72px);
          bottom: calc(var(--safe-bottom) + 54vh + 18px);
          right: 12px;
          width: min(168px, 42vw);
          gap: 8px;
        }

        .focus-category-button {
          min-height: 58px;
          gap: 8px;
        }

        .focus-category-orb {
          width: 52px;
        }

        .focus-category-label {
          font-size: 12px;
        }

        .focus-category-button small {
          display: none;
        }

        .service-sheet.visible {
          transform: translateY(0);
        }

        .service-sheet.switching {
          transform: translateY(18px) scale(0.985);
        }

        .service-card {
          grid-template-columns: 70px minmax(0, 1fr) auto;
          gap: 10px;
          padding: 10px;
          margin-bottom: 10px;
        }

        .service-card img {
          width: 70px;
          height: 54px;
          border-radius: 6px;
        }

        .service-card h3 {
          font-size: 18px;
        }

        .service-card p {
          font-size: 13px;
        }

        .service-price {
          padding-left: 10px;
          font-size: 15px;
          gap: 4px;
        }

        .add-cart-button {
          width: 34px;
          height: 34px;
          min-height: 34px;
        }

        .service-actions {
          grid-column: 2 / 4;
          justify-content: flex-start;
          gap: 8px;
        }

        .book-now-button {
          min-width: 86px;
          min-height: 34px;
          padding: 0 10px;
          font-size: 10px;
        }

        .ghost-button {
          width: 40px;
          height: 40px;
          font-size: 28px;
        }

        .form-row {
          grid-template-columns: 1fr;
        }

        .scene-instruction {
          top: calc(var(--safe-top) + 12px);
          left: 22px;
          width: min(330px, calc(100vw - 92px));
          gap: 4px;
        }

        .scene-instruction__row {
          gap: 8px;
        }

        .scene-instruction__row::before,
        .scene-instruction__row::after {
          width: 46px;
        }

        .scene-instruction h1 {
          font-size: clamp(18px, 5.2vw, 23px);
        }

        .mobile-arrows {
          display: flex;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
          transition-duration: 0.01ms !important;
        }
      .cel-return-btn {
        pointer-events: auto;
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 20;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        border: 1px solid rgba(184, 137, 63, 0.4);
        border-radius: 28px;
        background: rgba(3, 8, 17, 0.65);
        backdrop-filter: blur(12px);
        color: var(--gold-3);
        font: 500 13px var(--ui-font);
        letter-spacing: 0.06em;
        cursor: pointer;
        transition: all 0.3s ease;
        opacity: 0;
        transform: translateY(-8px);
        animation: celReturnFadeIn 0.8s 1.5s ease forwards;
      }
      .cel-return-btn:hover {
        background: rgba(184, 137, 63, 0.18);
        border-color: rgba(184, 137, 63, 0.7);
        transform: translateY(0) scale(1.02);
      }
      .cel-return-btn svg {
        width: 16px;
        height: 16px;
        transition: transform 0.3s ease;
      }
      .cel-return-btn:hover svg {
        transform: translateX(-3px);
      }
      @keyframes celReturnFadeIn {
        to { opacity: 1; transform: translateY(0); }
      }
      }
</style>
</head>

<body>

  <div id="app">
    <div id="black-overlay"></div>
    <button class="btn-nav" id="btn-prev">&#10094;</button>
    <button class="btn-nav" id="btn-next">&#10095;</button>
    <button id="btn-back-book">RETURN</button>

    <canvas id="scene" aria-hidden="true"></canvas>

  </div>

  <div id="lightbox">
    <div id="lightbox-close">&times;</div>

  </div>

  <div id="celestial-app" style="display:none; position:fixed; inset:0; z-index:10; opacity:0; transition:opacity 1.5s ease; background: radial-gradient(ellipse at 50% 38%, rgba(54, 75, 112, 0.24), transparent 46%), radial-gradient(ellipse at 72% 68%, rgba(90, 60, 30, 0.15), transparent 55%), linear-gradient(180deg, #01040a 0%, #07111e 40%, #0d1a2e 100%);">
      <div class="galaxy-nebula" aria-hidden="true"></div>
      <canvas id="cel-galaxy-canvas" aria-hidden="true"></canvas>
      <canvas id="cel-scene-celestial" aria-hidden="true"></canvas>
      <div class="vignette"></div>

      <ul class="sr-list" id="cel-category-a11y"></ul>

      <div class="hud">

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
          Quay lại Menu
        </button>
        <div class="scene-instruction" aria-hidden="true">
          <div class="scene-instruction__lotus">Khám phá Ngân Hà</div>

        </div>

        <div class="topbar">
          <button class="cart-button" id="cel-cartButton" type="button" aria-label="Giỏ hàng, 0 dịch vụ">

              <path d="M7 8h10l-.8 11H7.8L7 8Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"></path>
              <path d="M9 8a3 3 0 0 1 6 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>

        </div>

        <aside class="service-sheet" id="cel-serviceSheet" aria-live="polite">
          <div class="sheet-scroll">

        <div class="cart-notification" id="cel-cartNotification" role="status" aria-live="polite"></div>

          <header>

          </header>

        </div>

        <div class="layout-drag-handles" id="cel-layoutDragHandles" aria-hidden="true"></div>

            Category

          </label>

            <label>X <input id="cel-layoutXInput" type="number" step="0.01" /></label>
            <label>Y <input id="cel-layoutYInput" type="number" step="0.01" /></label>
            <label>Z <input id="cel-layoutZInput" type="number" step="0.01" /></label>
            <label>Scale <input id="cel-layoutScaleInput" type="number" step="0.01" min="0.1" /></label>
          </div>
          <div class="layout-editor__actions">
            <button id="cel-layoutSaveButton" type="button">Save</button>
            <button id="cel-layoutResetButton" type="button">Reset</button>

        <div class="build-mark">safe cinematic 3d ellipse v60</div>
      </div>
    </div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <!-- FlipBook Dependencies -->

  <script type="module">
    import { FlipMenu } from './FlipMenu.js?v=2.5';
    
    const flipApp = document.getElementById('app');
    const celestialApp = document.getElementById('celestial-app');
    
    // Khởi tạo thư viện Menu 3D
    const myMenu = new FlipMenu('#scene', {
      totalPages: 42,
      useDefaultUI: true,
      onInit: () => {
        console.log('Sách đã tải xong!');
        const loader = document.getElementById('loading');
        if (loader) loader.style.display = 'none';
      },
      onItemSelected: (categoryId) => {
        console.log('Bay xuyên qua sách vào danh mục:', categoryId);
        
        // 1. Kích hoạt hiệu ứng mờ sách
        flipApp.style.transition = 'opacity 1.5s ease';
        flipApp.style.opacity = '0';
        flipApp.style.pointerEvents = 'none';
        
        // 2. Hiện UI Thiên hà
        celestialApp.style.display = 'block';
        setTimeout(() => {
            celestialApp.style.opacity = '1';
        }, 100);

        // 3. Báo cho parent window (Next.js) phóng to iframe
        try { window.parent.postMessage({ type: 'flipmenu:galaxy-entered' }, '*'); } catch(e) {}

        // 4. Khởi tạo / Gọi Celestial Engine
        import('./CelestialEngine.js?v=2.5').then(module => {
            const engine = new module.CelestialEngine('#celestial-app');
            engine.init();
            
            // Xoá sách khỏi render để nhẹ máy
            setTimeout(() => {
                flipApp.style.display = 'none';
            }, 1500);
        }).catch(err => console.error("Lỗi tải Celestial:", err));
      }
    });

    // Return button in celestial-app
    const celReturnBtn = document.getElementById('cel-returnBtn');
    if (celReturnBtn) {
      celReturnBtn.addEventListener('click', () => {
        // Fade out celestial
        celestialApp.style.transition = 'opacity 1s ease';
        celestialApp.style.opacity = '0';
        
        // Notify parent to shrink iframe
        try { window.parent.postMessage({ type: 'flipmenu:book-returned' }, '*'); } catch(e) {}

        setTimeout(() => {
          celestialApp.style.display = 'none';
          // Restore book
          flipApp.style.display = 'block';
          flipApp.style.pointerEvents = 'auto';
          setTimeout(() => {
            flipApp.style.opacity = '1';
          }, 50);
        }, 1000);
      });
    }
  </script>

  <!-- Fake Click Hand -->
  <div class="fake-click-guide" id="fakeClickGuide" aria-hidden="true" style="position: fixed; pointer-events: none; z-index: 9999; display: none; color: #f0d29a; left: 0; top: 0;">

      </svg>
    </div>
  </div>
